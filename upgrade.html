const amounts = [5, 7, 10, 12, 15, 20, 25];
const methods = ["M-Pesa", "PayPal", "Crypto", "Bank"];

const box = document.getElementById("withdrawalBox");

function randomTime() {
    const times = ["just now", "2 sec ago", "5 sec ago", "10 sec ago"];
    return times[Math.floor(Math.random() * times.length)];
}

function generateWithdrawal() {
    const user = users[Math.floor(Math.random() * users.length)];
    const amount = amounts[Math.floor(Math.random() * amounts.length)];
    const method = methods[Math.floor(Math.random() * methods.length)];

    const item = document.createElement("div");
    item.className = "withdrawal-item";

    item.innerHTML = `
        <span class="left">
            ${user.flag} ${user.name}
        </span>
        <span class="right">
            $${amount} • ${method}
        </span>
        <div class="time">${randomTime()}</div>
    `;

    box.appendChild(item);

    // Smooth scroll effect
    box.scrollTop = box.scrollHeight;

    if (box.children.length > 6) {
        box.removeChild(box.children[0]);
    }
}

setInterval(generateWithdrawal, 1800);
