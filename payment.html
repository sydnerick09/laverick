<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mpesa Payment</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<div class="payment-container">

    <div class="header">
        <h2>M-Pesa Payment</h2>
        <p>To recieve tasks please pay a registration fee of ksh 100 to facilitate for registration  </p>

    </div>

    <div class="payment-body">

        <div class="amount-box">
            <p>
                LIPA NA MPESA
            </p>
            <h3>Ksh 100</h3>
        </div>

        <form>
            <label>Phone Number</label>
            <input type="tel" placeholder="enter mpesa number here 07XXXXXXXX" required>

            <button type="submit">Pay Now</button>
        </form>

        <div class="note">
            Enter your registered M-Pesa number
        </div>

    </div>

    <div class="footer">
        Powered by M-Pesa
    </div>

</div>

</body>
</html>
