<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Tasks</title>
<link rel="stylesheet" href="tasks.css">
</head>

<body>

<div class="task-container">

    <div class="header">
        <h2>Available Tasks</h2>
        <p>Choose a task and activate bidding</p>
    </div>

    <!-- DEMO BALANCE -->
    <div class="balance-box">
        <h3>💰 Your Balance</h3>
        <p id="balance">$05.00</p>
        <button onclick="withdraw()" class="withdraw-btn">Withdraw </button>
        <div id="withdraw-status"></div>
    </div>

    <div class="task-list" id="taskList"></div>

</div>

<script>
const tasks = [
"Data Entry","Typing Work","Survey","Product Review","Research",
"Form Filling","Copy Paste","Social Media","Image Tagging","Transcription",
"Lead Collection","App Testing","Content Writing","Email Submission","PDF Conversion",
"Spreadsheet Work","Web Search","Review Docs","Record Update","Customer Support"
];

let balance = 0;

// Generate 50 tasks
const container = document.getElementById("taskList");

for (let i = 1; i <= 50; i++) {
    let price = Math.floor(Math.random() * 31) + 10; // 10–40
    let isFree = i <= 1; //  5 free

    let card = document.createElement("div");
    card.className = "task-card " + (isFree ? "free" : "");

    card.innerHTML = `
        <span class="price">$${price}</span>
        <h3>Task ${i} - ${tasks[i % tasks.length]}</h3>
        <p>Complete this task and earn rewards.</p>
        <a href="${isFree ? 'working.html' : 'payment.html'}" 
           class="btn ${isFree ? 'free-btn' : ''}"
           onclick="${isFree ? `earn(${price})` : ''}">
           ${isFree ? "🟢 Free Task" : "🔒 Upgrade"}
        </a>
    `;

    container.appendChild(card);
}

// Earn money (demo)
function earn(amount){
    balance += amount;
    document.getElementById("balance").innerText = "$" + balance.toFixed(2);
}

// Withdrawal simulation (NOT real)
function withdraw(){
    const status = document.getElementById("withdraw-status");
    
    if(balance <= 0){
        status.innerHTML = "⚠️ upgrade for withdrawals";
        return;
    }

    status.innerHTML = "⏳ Processing withdrawal...";
    
    setTimeout(() => {
        status.innerHTML = "✅ Demo withdrawal successful!";
        balance = 0;
        document.getElementById("balance").innerText = "$05.00";
    }, 2000);
}
</script>

</body>
</html>
